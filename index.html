<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎬 مشغل فيديو متطور</title>
    <style>
        /* --------------------- المتغيرات العامة --------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0e14;
            --bg-card: #161b24;
            --bg-controls: #1f2937;
            --accent: #00e676;
            --accent-dark: #00c853;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            --radius: 16px;
            --transition: 0.25s ease;
        }

        body {
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            color: var(--text-primary);
            margin: 0;
        }

        /* --------------------- الحاوية الرئيسية --------------------- */
        .container {
            width: 100%;
            max-width: 860px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px 20px 18px;
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }

        /* --------------------- حاوية الفيديو --------------------- */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center center;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        #player {
            width: 100%;
            height: 100%;
            pointer-events: none; /* نمنع التفاعل المباشر مع iframe */
        }

        /* طبقة شفافة فوق الفيديو لالتقاط النقرات */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* تسمح بالنقر من خلالها */
        }

        /* --------------------- شريط التحميل (Loading) --------------------- */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            border-radius: 12px;
        }
        .loading-overlay.active {
            opacity: 1;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --------------------- شريط التحكم السفلي (تحت الفيديو) --------------------- */
        .controls-container {
            margin-top: 16px;
            background: var(--bg-controls);
            border-radius: 12px;
            padding: 12px 14px 14px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        /* شريط التقدم */
        .progress-bar-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .time-display {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            min-width: 46px;
            letter-spacing: 0.3px;
            font-variant-numeric: tabular-nums;
        }
        .progress-track {
            flex: 1;
            height: 5px;
            background: #374151;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
        }
        .progress-track:hover { height: 7px; }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-dark), var(--accent));
            border-radius: 10px;
            transition: width 0.05s linear;
            position: relative;
        }
        /* نقطة السحب (thumb) */
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.5);
        }
        .progress-track:hover .progress-fill::after { opacity: 1; }

        /* صف الأزرار الرئيسية */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 6px 10px;
        }
        .controls-row button {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            min-width: 44px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
        }
        .controls-row button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-color);
            color: var(--accent);
        }
        .controls-row button:active { transform: scale(0.94); }
        .controls-row .active-btn {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .controls-row .active-btn:hover {
            background: var(--accent-dark);
            color: #000;
        }

        /* زر الصوت - شريط جانبي */
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-right: 4px;
        }
        .volume-slider {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #374151;
            border-radius: 10px;
            outline: none;
            transition: 0.2s;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0, 230, 118, 0.3);
        }
        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }

        /* --------------------- الإشعارات (Toasts) --------------------- */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid var(--accent);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            white-space: nowrap;
            direction: ltr;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* --------------------- التوافق مع الشاشات الصغيرة --------------------- */
        @media (max-width: 600px) {
            .container { padding: 12px; }
            .controls-container { padding: 10px; }
            .controls-row { gap: 4px; }
            .controls-row button {
                font-size: 0.9rem;
                padding: 4px 8px;
                min-width: 36px;
            }
            .volume-slider { width: 40px; }
            .time-display { font-size: 0.7rem; min-width: 36px; }
            .toast { font-size: 0.8rem; padding: 6px 16px; }
        }
    </style>
</head>
<body>

    <!-- حاوية الإشعارات -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- الحاوية الرئيسية -->
    <div class="container">
        <!-- حاوية الفيديو -->
        <div class="video-wrapper" id="wrapper">
            <div class="overlay" id="videoOverlay"></div>
            <div id="player"></div>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- لوحة التحكم -->
        <div class="controls-container">
            <!-- شريط التقدم + الوقت -->
            <div class="progress-bar-wrapper">
                <span class="time-display" id="currentTime">00:00</span>
                <div class="progress-track" id="progressTrack">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time-display" id="totalTime">00:00</span>
            </div>

            <!-- صف الأزرار -->
            <div class="controls-row">
                <!-- تشغيل / إيقاف -->
                <button id="playBtn" title="تشغيل/إيقاف (Space)">▶</button>

                <!-- تقديم / تأخير 5 ثوانٍ -->
                <button id="rewindBtn" title="رجوع 5 ثوانٍ (←)">⏪</button>
                <button id="forwardBtn" title="تقديم 5 ثوانٍ (→)">⏩</button>

                <!-- سرعة -->
                <button id="speedBtn" title="تغيير السرعة">1.0×</button>

                <!-- الصوت -->
                <div class="volume-wrap">
                    <button id="muteBtn" title="كتم/رفع الصوت (M)">🔊</button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" />
                </div>

                <!-- زوم -->
                <button id="zoomInBtn" title="تكبير">🔍+</button>
                <button id="zoomOutBtn" title="تصغير">🔍−</button>
                <button id="resetZoomBtn" title="إعادة تعيين الزوم">⟲</button>

                <!-- ملء الشاشة -->
                <button id="fullscreenBtn" title="ملء الشاشة (F)">⛶</button>
            </div>
        </div>
    </div>

    <!-- تحميل API اليوتيوب -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // ================================================================
        //  1.  إدارة الحالة العامة
        // ================================================================
        const state = {
            player: null,
            isPlaying: false,
            currentVolume: 100,
            isMuted: false,
            playbackRate: 1,
            zoomLevel: 1,
            duration: 0,
            currentTime: 0,
            isFullscreen: false,
            isReady: false,
        };

        // ================================================================
        //  2.  عناصر DOM
        // ================================================================
        const $ = id => document.getElementById(id);
        const wrapper = $('wrapper');
        const overlay = $('videoOverlay');
        const loading = $('loadingOverlay');
        const playBtn = $('playBtn');
        const progressFill = $('progressFill');
        const progressTrack = $('progressTrack');
        const currentTimeEl = $('currentTime');
        const totalTimeEl = $('totalTime');
        const speedBtn = $('speedBtn');
        const muteBtn = $('muteBtn');
        const volumeSlider = $('volumeSlider');
        const zoomInBtn = $('zoomInBtn');
        const zoomOutBtn = $('zoomOutBtn');
        const resetZoomBtn = $('resetZoomBtn');
        const fullscreenBtn = $('fullscreenBtn');
        const rewindBtn = $('rewindBtn');
        const forwardBtn = $('forwardBtn');

        // ================================================================
        //  3.  الإشعارات (Toasts)
        // ================================================================
        function showToast(message, duration = 1400) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);

            // إظهار بعد 10ms لتفعيل الانتقال
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, duration);
        }

        // ================================================================
        //  4.  تهيئة مشغل اليوتيوب
        // ================================================================
        function onYouTubeIframeAPIReady() {
            state.player = new YT.Player('player', {
                videoId: 'WJsOHealXwk',
                playerVars: {
                    controls: 0,
                    rel: 0,
                    modestbranding: 1,
                    iv_load_policy: 3,
                    disablekb: 1,  // نمنع اختصارات يوتيوب الأصلية
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                    onError: (e) => showToast('⚠️ حدث خطأ في الفيديو'),
                }
            });
        }

        // ================================================================
        //  5.  أحداث المشغل
        // ================================================================
        function onPlayerReady(event) {
            state.isReady = true;
            loading.classList.remove('active');

            // ضبط مستوى الصوت
            state.player.setVolume(state.currentVolume);
            volumeSlider.value = state.currentVolume;

            // قراءة المدة الكلية
            state.duration = state.player.getDuration();
            updateTotalTime();

            // تحديث شريط التقدم بشكل دوري
            startProgressUpdater();

            // إظهار حالة جاهزية
            showToast('✅ الفيديو جاهز', 1000);
        }

        function onPlayerStateChange(event) {
            const data = event.data;
            if (data === YT.PlayerState.PLAYING) {
                state.isPlaying = true;
                playBtn.textContent = '⏸';
                loading.classList.remove('active');
            } else if (data === YT.PlayerState.PAUSED) {
                state.isPlaying = false;
                playBtn.textContent = '▶';
            } else if (data === YT.PlayerState.ENDED) {
                state.isPlaying = false;
                playBtn.textContent = '▶';
                progressFill.style.width = '100%';
                showToast('🏁 انتهى الفيديو', 1200);
            } else if (data === YT.PlayerState.BUFFERING) {
                loading.classList.add('active');
            } else if (data === YT.PlayerState.CUED) {
                loading.classList.remove('active');
            }
        }

        // ================================================================
        //  6.  تحديث شريط التقدم والوقت
        // ================================================================
        let progressInterval = null;

        function startProgressUpdater() {
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (!state.player || !state.isReady) return;
                const current = state.player.getCurrentTime();
                const duration = state.player.getDuration();
                if (duration > 0) {
                    const percent = (current / duration) * 100;
                    progressFill.style.width = Math.min(percent, 100) + '%';
                    currentTimeEl.textContent = formatTime(current);
                    state.currentTime = current;
                    state.duration = duration;
                }
            }, 250);
        }

        function updateTotalTime() {
            if (state.duration) {
                totalTimeEl.textContent = formatTime(state.duration);
            }
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // ================================================================
        //  7.  التحكم الأساسي (تشغيل، إيقاف، سرعة، صوت، زوم، ملء الشاشة)
        // ================================================================

        // --- تشغيل / إيقاف ---
        function togglePlay() {
            if (!state.player) return;
            if (state.isPlaying) {
                state.player.pauseVideo();
            } else {
                state.player.playVideo();
            }
        }

        // --- تقديم / تأخير ---
        function seek(seconds) {
            if (!state.player) return;
            const current = state.player.getCurrentTime();
            const newTime = Math.min(Math.max(current + seconds, 0), state.duration);
            state.player.seekTo(newTime, true);
            showToast(`${seconds > 0 ? '⏩' : '⏪'} ${Math.abs(seconds)} ثانية`, 600);
        }

        // --- تغيير السرعة ---
        function cycleSpeed() {
            const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
            let idx = speeds.indexOf(state.playbackRate);
            idx = (idx + 1) % speeds.length;
            const newRate = speeds[idx];
            state.player.setPlaybackRate(newRate);
            state.playbackRate = newRate;
            speedBtn.textContent = newRate.toFixed(1) + '×';
            showToast(`⚡ السرعة: ${newRate.toFixed(1)}×`, 800);
        }

        // --- الصوت ---
        function toggleMute() {
            if (!state.player) return;
            state.isMuted = !state.isMuted;
            state.player.setMute(state.isMuted);
            muteBtn.textContent = state.isMuted ? '🔇' : '🔊';
            volumeSlider.value = state.isMuted ? 0 : state.currentVolume;
            showToast(state.isMuted ? '🔇 كتم الصوت' : '🔊 إلغاء الكتم', 600);
        }

        function setVolume(val) {
            const vol = parseInt(val);
            state.currentVolume = vol;
            if (state.player) {
                state.player.setVolume(vol);
                if (vol === 0) {
                    state.isMuted = true;
                    muteBtn.textContent = '🔇';
                } else {
                    state.isMuted = false;
                    muteBtn.textContent = '🔊';
                    state.player.unMute();
                }
            }
        }

        // --- الزوم ---
        function setZoom(level) {
            // حدود آمنة
            const newLevel = Math.min(Math.max(level, 0.5), 2.0);
            state.zoomLevel = newLevel;
            wrapper.style.transform = `scale(${newLevel})`;
            showToast(`🔍 تكبير: ${newLevel.toFixed(2)}×`, 700);
        }

        function resetZoom() {
            setZoom(1);
        }

        // --- ملء الشاشة ---
        function toggleFullscreen() {
            const el = wrapper;
            if (!document.fullscreenElement) {
                const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (req) req.call(el);
            } else {
                const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
                if (exit) exit.call(document);
            }
        }

        // ================================================================
        //  8.  ربط الأحداث (Event Listeners)
        // ================================================================

        // --- أزرار التحكم ---
        playBtn.addEventListener('click', togglePlay);
        overlay.addEventListener('click', togglePlay);  // نقر على الفيديو

        rewindBtn.addEventListener('click', () => seek(-5));
        forwardBtn.addEventListener('click', () => seek(5));

        speedBtn.addEventListener('click', cycleSpeed);

        muteBtn.addEventListener('click', toggleMute);
        volumeSlider.addEventListener('input', (e) => setVolume(e.target.value));

        zoomInBtn.addEventListener('click', () => setZoom(state.zoomLevel + 0.15));
        zoomOutBtn.addEventListener('click', () => setZoom(state.zoomLevel - 0.15));
        resetZoomBtn.addEventListener('click', resetZoom);

        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // --- شريط التقدم (النقر للانتقال) ---
        progressTrack.addEventListener('click', (e) => {
            if (!state.player || !state.duration) return;
            const rect = progressTrack.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const seekTime = x * state.duration;
            state.player.seekTo(seekTime, true);
            showToast(`⏱️ ${formatTime(seekTime)}`, 500);
        });

        // --- لوحة المفاتيح ---
        document.addEventListener('keydown', (e) => {
            // نتجنب التعارض مع الحقول النصية
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            switch (e.key) {
                case ' ':
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    seek(5);
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    seek(-5);
                    break;
                case 'f':
                case 'F':
                    e.preventDefault();
                    toggleFullscreen();
                    break;
                case 'm':
                case 'M':
                    e.preventDefault();
                    toggleMute();
                    break;
                case 'r':
                case 'R':
                    e.preventDefault();
                    resetZoom();
                    break;
            }
        });

        // --- استماع لتغيير ملء الشاشة (لتحديث الزر) ---
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('msfullscreenchange', updateFullscreenButton);

        function updateFullscreenButton() {
            state.isFullscreen = !!document.fullscreenElement;
            fullscreenBtn.textContent = state.isFullscreen ? '⛶' : '⛶';
        }

        // ================================================================
        //  9.  معالجة تغيير حجم النافذة (للحفاظ على الزوم)
        // ================================================================
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                // نعيد تطبيق الزوم لضمان الثبات
                wrapper.style.transform = `scale(${state.zoomLevel})`;
            }, 150);
        });

        // ================================================================
        // 10.  تهيئة إضافية عند تحميل الصفحة
        // ================================================================
        window.addEventListener('load', () => {
            // نضبط القيم الابتدائية
            speedBtn.textContent = '1.0×';
            // نعرض رسالة ترحيب
            setTimeout(() => showToast('🎬 استخدم Space للتشغيل/الإيقاف', 2000), 500);
        });

        // ================================================================
        // 11.  Export للاختبار (اختياري)
        // ================================================================
        console.log('✅ مشغل الفيديو المتطور جاهز!');
        console.log('📖 اختصارات: Space (تشغيل/إيقاف)، ← → (تقديم/تأخير 5ث)، F (شاشة كاملة)، M (كتم)');
    </script>

</body>
</html>
